<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ledger Vault</title>
    <style>
        /* --- LEDGER CYBER-MINIMALIST THEME --- */
        :root {
            --bg-dark: #0F1015;          /* Deep charcoal background */
            --bg-panel: #1A1B23;         /* Slightly lighter panel background */
            --text-main: #FFFFFF;        /* Crisp white text */
            --text-muted: #8B8D98;       /* Muted gray for subtitles */
            --accent-waiting: #8A2BE2;   /* Ledger Purple */
            --accent-success: #03DAC6;   /* Success Teal */
            --accent-error: #CF6679;     /* Error Red */
        }

        body {
            width: 280px;
            margin: 0;
            padding: 24px 20px;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- HEADER --- */
        .header {
            margin-bottom: 24px;
            width: 100%;
        }

        .header h2 {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 6px;
            line-height: 1.4;
        }

        /* --- THE SECURE ENCLAVE (QR CONTAINER) --- */
        #qr-container {
            background-color: #FFFFFF;
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            margin: 0 0 24px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 200px;
            height: 200px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #qr-code {
            width: 100%;
            height: 100%;
            display: none; /* Hidden until injected by JS */
            image-rendering: crisp-edges;
        }

        /* --- TACTICAL STATUS BAR --- */
        .status-badge {
            font-size: 14px;
            font-weight: 600;
            padding: 12px 16px;
            border-radius: 12px;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.3s ease;
            background-color: var(--bg-panel);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin: 0;
        }

        /* Dynamic JS States */
        .status-badge.waiting {
            color: #B388FF; /* Soft glowing purple text */
            border-color: rgba(138, 43, 226, 0.3);
            background-color: rgba(138, 43, 226, 0.08);
            animation: pulse 2s infinite;
        }

        .status-badge.success {
            color: #000000;
            background-color: var(--accent-success);
            border-color: var(--accent-success);
            box-shadow: 0 0 15px rgba(3, 218, 198, 0.3);
        }

        .status-badge.error {
            color: #FFFFFF;
            background-color: var(--accent-error);
            border-color: var(--accent-error);
        }

        /* Breathing animation for the waiting state */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(138, 43, 226, 0.2); }
            70% { box-shadow: 0 0 0 10px rgba(138, 43, 226, 0); }
            100% { box-shadow: 0 0 0 0 rgba(138, 43, 226, 0); }
        }
    </style>
</head>
<body>

<div class="header">
    <h2>Ledger</h2>
    <div class="subtitle">Secure optical bridge ready.</div>
</div>

<div id="qr-container">
    <img id="qr-code" alt="Secure Ledger Bridge QR" />
</div>

<div id="status-text" class="status-badge waiting">Initializing Node...</div>

<script src="config.js"></script>
<script src="popup.js"></script>
</body>
</html>
