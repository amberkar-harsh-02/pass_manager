<!DOCTYPE html>
<html>
<head>
    <title>VaultShield Registration Test</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; max-width: 400px; margin: auto; background-color: #f4f4f9;}
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333;}
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #6200EE; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Create an Account</h2>
        
        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email">
        </div>
        
        <div class="input-group">
            <label for="pass">Password</label>
            <input type="password" id="pass" placeholder="Create a strong password">
        </div>
        
        <div class="input-group">
            <label for="confirm_pass">Confirm Password</label>
            <input type="password" id="confirm_pass" placeholder="Confirm your password">
        </div>
        
        <button type="button">Sign Up</button>
    </div>
</body>
</html>
